<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | E-Commerce Product Catalog</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <h2>ShopEase</h2>
        </div>

        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">
                    <i class="fas fa-shopping-cart"></i>
                    Cart (<span id="cart-count">0</span>)
                </a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover the Best Products</h1>
            <p>Shop quality products at unbeatable prices.</p>

            <a href="products.html" class="btn">
                Shop Now
            </a>
        </div>
    </section>

    <!-- Categories -->
    <section class="categories">

        <h2>Shop by Category</h2>

        <div class="category-container">

            <div class="category-card">
                <img src="images/electronics.jpg" alt="Electronics">
                <h3>Electronics</h3>
            </div>

            <div class="category-card">
                <img src="images/fashion.jpg" alt="Fashion">
                <h3>Fashion</h3>
            </div>

            <div class="category-card">
                <img src="images/shoes.jpg" alt="Shoes">
                <h3>Shoes</h3>
            </div>

            <div class="category-card">
                <img src="images/watch.jpg" alt="Watches">
                <h3>Watches</h3>
            </div>

        </div>

    </section>

    <!-- Featured Products -->
    <section class="featured">

        <h2>Featured Products</h2>

        <div id="featured-products" class="product-grid">

            <!-- Products loaded using JavaScript -->

        </div>

    </section>

    <!-- Footer -->
    <footer>

        <p>
            © 2026 ShopEase. All Rights Reserved.
        </p>

    </footer>

    <script src="js/app.js"></script>

</body>
</html>
