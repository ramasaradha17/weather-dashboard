```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ShopEase</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">
            <h2>ShopEase</h2>
        </div>

        <nav>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="products.html">Products</a></li>

                <li>
                    <a href="cart.html">
                        <i class="fas fa-shopping-cart"></i>
                        Cart
                    </a>
                </li>

                <li><a href="about.html">About</a></li>

                <li><a href="contact.html" class="active">Contact</a></li>

            </ul>

        </nav>

    </header>

    <!-- Contact Section -->

    <section class="featured">

        <h2>Contact Us</h2>

        <p style="text-align:center; margin:20px 0;">
            We'd love to hear from you! Feel free to contact us.
        </p>

        <div style="max-width:700px; margin:auto;">

            <form>

                <input
                    type="text"
                    placeholder="Full Name"
                    required
                    style="width:100%;padding:12px;margin-bottom:15px;">

                <input
                    type="email"
                    placeholder="Email Address"
                    required
                    style="width:100%;padding:12px;margin-bottom:15px;">

                <input
                    type="text"
                    placeholder="Subject"
                    required
                    style="width:100%;padding:12px;margin-bottom:15px;">

                <textarea
                    rows="6"
                    placeholder="Your Message"
                    required
                    style="width:100%;padding:12px;margin-bottom:20px;"></textarea>

                <button class="btn" type="submit">
                    Send Message
                </button>

            </form>

        </div>

        <br><br>

        <h2>Contact Information</h2>

        <div style="text-align:center; line-height:2;">

            <p><i class="fas fa-envelope"></i> support@shopease.com</p>

            <p><i class="fas fa-phone"></i> +91 98765 43210</p>

            <p><i class="fas fa-map-marker-alt"></i> Hyderabad, India</p>

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>© 2026 ShopEase. All Rights Reserved.</p>

    </footer>

</body>

</html>
```
